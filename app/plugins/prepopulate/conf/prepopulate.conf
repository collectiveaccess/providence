#
# prepopulate field configuration
#

# set to 1 to enable the plugin
enabled = 0

# The prepopulate_fields_* settings below set default behaviors controlling when prepopulate rules are applied.
# Each rule may optionally be restricted using the "useFor" per-rule setting.

# Apply rules whenever record is opened in the editor user interface.
prepopulate_fields_on_edit = 0

# Apply rules whenever record is saved in the editor user interface.
prepopulate_fields_on_save = 0

# Apply rules prior to initial insert of new record. This is triggered by *any* insert to the database, 
# including those triggered by the editor user interface and API.
prepopulate_fields_before_insert = 0

# Apply rules on initial insert of new record. This is triggered by *any* insert to the database, 
# including those triggered by the editor user interface and API.
prepopulate_fields_on_insert = 0

# Apply rules on update to a record. This is triggered by *any* update to the database, 
# including those triggered by the editor user interface and API.
prepopulate_fields_on_update = 0

prepopulate_rules = {
	# -------------------
	test_rule = {
		# what types of records does this rule apply to?
		table = ca_objects,
		#restrictToTypes = [artwork],

		# mode determines handling of existing values in target element
		# can be overwrite, or addIfEmpty
		# See the 'target' setting below and http://docs.collectiveaccess.org/wiki/Prepopulate
		mode = addIfEmpty,
		
		# Set which events this run runs on here. Values can be "beforeInsert", "insert", "update", "edit" and/or "save".
		# This will override prepopulate_fields_before_insert, prepopulate_fields_insert, prepopulate_fields_update,
		# prepopulate_fields_on_save and prepopulate_fields_on_edit.
		# If userFor is omitted values from the prepopulate_fields_* settings will be used.
		useFor = [edit, save],

		# What's the prepopulate target?
		# This can be an intrinsic field, labels or an attribute.
		#
		# Note that if you want to target a List attribute, you have to
		# provide a valid list item idno or id for that list as value!
		#
		# See http://docs.collectiveaccess.org/wiki/Prepopulate
		target = ca_objects.description,

		# skip this rule if expression returns true
		# available variable names are bundle names
		#skipIfExpression = ^ca_objects.idno =~ /test/,

		# content to prepopulate
		# (this is a display template evaluated against the current record)
		template = ^ca_objects.preferred_labels (^ca_objects.idno),
	},
	# -------------------
}
